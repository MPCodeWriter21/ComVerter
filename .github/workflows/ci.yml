name: CI

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/ci.yml"
      - "meson.build"
      - "pyproject.toml"
      - "src/**/*.c"
      - "src/**/*.h"
      - "src/**/*.py"
      - "src/**/*.pyi"
      - "tests/**/*.py"
      - "tests/**/*.json"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "meson.build"
      - "pyproject.toml"
      - "src/**/*.c"
      - "src/**/*.h"
      - "src/**/*.py"
      - "src/**/*.pyi"
      - "tests/**/*.py"
      - "tests/**/*.json"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          pip install meson-python ninja uv

      - name: Build wheel
        env:
          UV_PYTHON_PREFERENCE: only-system
        run: |
          uv python pin ${{ matrix.python-version }} && uv build --wheel

      - name: Install wheel
        run: uv pip install dist/comverter-*.whl --force-reinstall --system

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest -v tests/
